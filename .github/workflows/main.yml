name: RDP-Azure-ExitNode

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *' # Berjalan otomatis setiap 5 jam

concurrency:
  group: tailscale-exit-node
  cancel-in-progress: true # Mematikan runner lama otomatis jika cron baru masuk

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:

      - name: Enable RDP
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
            -Name "fDenyTSConnections" -Value 0 -Force

          netsh advfirewall firewall add rule name="RDP-Tailscale" `
            dir=in action=allow protocol=TCP localport=3389

          Restart-Service -Name TermService -Force

      - name: Create RDP User
        run: |
          $password = -join ((33..126) | Get-Random -Count 20 | ForEach-Object {[char]$_})
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force

          New-LocalUser -Name "RDP" -Password $securePass -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member "RDP"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RDP"

          echo "RDP_USER=RDP" >> $env:GITHUB_ENV
          echo "RDP_PASS=$password" >> $env:GITHUB_ENV

      - name: Install and Connect Tailscale
        run: |
          # 1. Aktifkan IP Routing agar Exit Node bisa meneruskan koneksi internet
          Set-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Services\Tcpip\Parameters" -Name "IPEnableRouter" -Value 1

          # 2. Download dan Install
          Write-Host "Mengunduh Tailscale..."
          Invoke-WebRequest https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi -OutFile ts.msi
          
          Write-Host "Menginstal Tailscale secara silent..."
          $installProcess = Start-Process msiexec.exe -ArgumentList "/i ts.msi /quiet /norestart" -Wait -PassThru -NoNewWindow
          $installProcess.WaitForExit()

          # 3. Agresif mencari lokasi eksekusi tailscale.exe
          $paths = @(
              "$env:ProgramFiles\Tailscale\tailscale.exe",
              "${env:ProgramFiles(x86)}\Tailscale\tailscale.exe",
              "C:\Program Files\Tailscale\tailscale.exe",
              "C:\Program Files (x86)\Tailscale\tailscale.exe"
          )
          
          $ts = ""
          $retry = 0
          while ($ts -eq "" -and $retry -lt 15) {
              foreach ($p in $paths) {
                  if (Test-Path $p) {
                      $ts = $p
                      break
                  }
              }
              if ($ts -eq "") {
                  Write-Host "Menunggu Windows mengekstrak file... ($retry/15)"
                  Start-Sleep -Seconds 2
                  $retry++
              }
          }

          if ($ts -eq "") {
              Write-Error "FATAL: tailscale.exe gagal ditemukan di direktori mana pun setelah instalasi!"
              exit 1
          }

          Write-Host "Tailscale sukses ditemukan di: $ts"
          
          # Simpan path yang valid ke ENV untuk digunakan step 'Get Tailscale IP'
          echo "TS_PATH=$ts" >> $env:GITHUB_ENV

          # 4. Connect (Menghapus flag ephemeral yang salah, menambah unattended)
          Write-Host "Menjalankan autentikasi..."
          & $ts up `
            --authkey="${{ secrets.TAILSCALE_AUTH_KEY }}" `
            --hostname="gh-runner-$env:GITHUB_RUN_ID" `
            --advertise-exit-node `
            --advertise-tags="tag:github" `
            --accept-routes `
            --unattended `
            --reset

          Start-Sleep -Seconds 15

          Write-Host "`n=== TAILSCALE STATUS ==="
          & $ts status

      - name: Show Azure Public Info
        run: |
          Write-Host "`n=== AZURE PUBLIC INFO ==="
          $ipinfo = Invoke-RestMethod https://ipinfo.io/json
          $ipinfo | ConvertTo-Json -Depth 3

      - name: Get Tailscale IP
        run: |
          # Memanggil TS_PATH yang sudah dijamin valid dari step sebelumnya
          $ts = $env:TS_PATH
          $tsIP = & $ts ip -4
          echo "TAILSCALE_IP=$tsIP" >> $env:GITHUB_ENV

      - name: Display RDP Info
        run: |
          Write-Host "`n=== RDP ACCESS ==="
          Write-Host "Tailscale IP : $env:TAILSCALE_IP"
          Write-Host "Username     : $env:RDP_USER"
          Write-Host "Password     : $env:RDP_PASS"
          Write-Host "=========================`n"

      - name: Keep Alive
        run: |
          while ($true) {
              Write-Host "[$(Get-Date)] Exit Node Active"
              Start-Sleep -Seconds 600
          }
