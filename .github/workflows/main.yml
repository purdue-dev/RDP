name: RDP-Azure-ExitNode

on:
  workflow_dispatch:
  schedule:
    # FITUR CRON: Berjalan otomatis setiap 5 jam sekali
    - cron: '0 */5 * * *'

# FITUR CONCURRENCY: Mematikan sesi lama secara otomatis jika sesi baru aktif (mencegah tabrakan IP)
concurrency:
  group: rdp-exit-node
  cancel-in-progress: true

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Enable RDP
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
            -Name "fDenyTSConnections" -Value 0 -Force

          netsh advfirewall firewall add rule name="RDP-Tailscale" `
            dir=in action=allow protocol=TCP localport=3389

          Restart-Service -Name TermService -Force

      - name: Create RDP User
        run: |
          $password = -join ((33..126) | Get-Random -Count 20 | ForEach-Object {[char]$_})
          
          # FITUR MASKING: Menyembunyikan password dari log publik GitHub agar tidak bisa di-intercept orang luar
          echo "::add-mask::$password"
          
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force

          New-LocalUser -Name "RDP" -Password $securePass -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member "RDP"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RDP"

          echo "RDP_USER=RDP" >> $env:GITHUB_ENV
          echo "RDP_PASS=$password" >> $env:GITHUB_ENV

      - name: Install Tailscale
        run: |
          Invoke-WebRequest https://tailscale.com -OutFile ts.msi
          Start-Process msiexec.exe -ArgumentList "/i ts.msi /quiet /norestart" -Wait

      - name: Connect Tailscale as Auto Exit Node
        run: |
          $ts = "$env:ProgramFiles\Tailscale\tailscale.exe"

          & $ts up `
            --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} `
            --hostname=gh-runner-$env:GITHUB_RUN_ID `
            --advertise-exit-node `
            --advertise-tags=tag:github `
            --accept-routes `
            --reset

          Start-Sleep -Seconds 15

          Write-Host "`n=== TAILSCALE STATUS ==="
          & $ts status

      - name: Show Azure Public Info
        run: |
          Write-Host "`n=== AZURE PUBLIC INFO ==="
          $ipinfo = Invoke-RestMethod https://ipinfo.io
          $ipinfo | ConvertTo-Json -Depth 3

      - name: Get Tailscale IP
        run: |
          $ts = "$env:ProgramFiles\Tailscale\tailscale.exe"
          $tsIP = & $ts ip -4
          echo "TAILSCALE_IP=$tsIP" >> $env:GITHUB_ENV

      - name: Display RDP Info
        run: |
          Write-Host "`n=== RDP ACCESS ==="
          Write-Host "Tailscale IP : $env:TAILSCALE_IP"
          Write-Host "Username     : $env:RDP_USER"
          Write-Host "Password     : $env:RDP_PASS"
          Write-Host "=========================`n"

      - name: Keep Alive with Anti-Idle Activity
        run: |
          # FITUR ANTI-IDLE: Berhenti di menit ke-350 untuk memberikan jeda waktu shutdown bersih
          $endTime = (Get-Date).AddMinutes(350)
          
          while ((Get-Date) -lt $endTime) {
              Write-Host "[$(Get-Date)] Exit Node Active"
              
              # Mengirim 1 paket ping ke DNS Google setiap 5 menit agar mesin terdeteksi aktif bekerja oleh GitHub
              Test-Connection -ComputerName 8.8.8.8 -Count 1 -Quiet
              Start-Sleep -Seconds 300
          }

      - name: Gracefully Disconnect Tailscale
        if: always() # FITUR SHUTDOWN: Langkah ini dijamin SELALU jalan meskipun workflow dimatikan/di-cancel
        run: |
          $ts = "$env:ProgramFiles\Tailscale\tailscale.exe"
          if (Test-Path $ts) {
              Write-Host "Safely logging out from Tailscale network..."
              & $ts logout
          }
          
