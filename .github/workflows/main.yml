name: RDP-Azure-ExitNode

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *' # Berjalan otomatis setiap 5 jam

concurrency:
  group: tailscale-exit-node
  cancel-in-progress: true # Mematikan runner sebelumnya jika cron baru berjalan

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:

      - name: Enable RDP
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
            -Name "fDenyTSConnections" -Value 0 -Force

          netsh advfirewall firewall add rule name="RDP-Tailscale" `
            dir=in action=allow protocol=TCP localport=3389

          Restart-Service -Name TermService -Force

      - name: Create RDP User
        run: |
          $password = -join ((33..126) | Get-Random -Count 20 | ForEach-Object {[char]$_})
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force

          New-LocalUser -Name "RDP" -Password $securePass -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member "RDP"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RDP"

          echo "RDP_USER=RDP" >> $env:GITHUB_ENV
          echo "RDP_PASS=$password" >> $env:GITHUB_ENV

      - name: Install Tailscale
        run: |
          Invoke-WebRequest https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi -OutFile ts.msi
          # Ditambah -NoNewWindow agar proses background tidak menggantung
          Start-Process msiexec.exe -ArgumentList "/i ts.msi /quiet /norestart" -Wait -NoNewWindow
          
          # Ditambah jeda agar Windows mematangkan file di Program Files
          Start-Sleep -Seconds 5
          
          # Verifikasi path untuk mencegah error 'not recognized' di step selanjutnya
          if (-Not (Test-Path "$env:ProgramFiles\Tailscale\tailscale.exe")) {
              Write-Error "Instalasi gagal: tailscale.exe tidak ditemukan!"
              exit 1
          }

      - name: Connect Tailscale as Auto Exit Node
        run: |
          # DITAMBAHKAN: Mengaktifkan IP Forwarding di Windows agar Exit Node bisa meneruskan internet
          Set-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Services\Tcpip\Parameters" -Name "IPEnableRouter" -Value 1

          $ts = "$env:ProgramFiles\Tailscale\tailscale.exe"

          # DITAMBAHKAN: flag --ephemeral di bawah
          & $ts up `
            --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} `
            --hostname=gh-runner-$env:GITHUB_RUN_ID `
            --advertise-exit-node `
            --advertise-tags=tag:github `
            --accept-routes `
            --ephemeral `
            --reset

          Start-Sleep -Seconds 15

          Write-Host "`n=== TAILSCALE STATUS ==="
          & $ts status

      - name: Show Azure Public Info
        run: |
          Write-Host "`n=== AZURE PUBLIC INFO ==="
          $ipinfo = Invoke-RestMethod https://ipinfo.io/json
          $ipinfo | ConvertTo-Json -Depth 3

      - name: Get Tailscale IP
        run: |
          $ts = "$env:ProgramFiles\Tailscale\tailscale.exe"
          $tsIP = & $ts ip -4
          echo "TAILSCALE_IP=$tsIP" >> $env:GITHUB_ENV

      - name: Display RDP Info
        run: |
          Write-Host "`n=== RDP ACCESS ==="
          Write-Host "Tailscale IP : $env:TAILSCALE_IP"
          Write-Host "Username     : $env:RDP_USER"
          Write-Host "Password     : $env:RDP_PASS"
          Write-Host "=========================`n"

      - name: Keep Alive
        run: |
          while ($true) {
              Write-Host "[$(Get-Date)] Exit Node Active"
              Start-Sleep -Seconds 600
          }
