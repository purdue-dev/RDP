name: RDP-v5.0-AzureWorkstation

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

concurrency:
  group: tailscale-exit-node
  cancel-in-progress: true

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Enable RDP & OpenSSH Server
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          netsh advfirewall firewall add rule name="RDP-Tailscale" dir=in action=allow protocol=TCP localport=3389
          Restart-Service -Name TermService -Force
          
          Add-WindowsCapability -Online -Name OpenSSH.Server~~~~0.0.1.0
          Start-Service sshd
          Set-Service -Name sshd -StartupType 'Automatic'
          netsh advfirewall firewall add rule name="OpenSSH-Server-In-TCP" dir=in action=allow protocol=TCP localport=22

      - name: Configure Shared-Session Password (runneradmin)
        run: |
          $chars = (48..57) + (65..90) + (97..122)
          $password = -join ($chars | Get-Random -Count 20 | ForEach-Object {[char]$_})
          
          $netCmd = "net user runneradmin $password"
          cmd.exe /c $netCmd

          echo "RDP_USER=runneradmin" >> $env:GITHUB_ENV
          echo "RDP_PASS=$password" >> $env:GITHUB_ENV

      - name: Install Network Core (Tailscale, Speedtest, Cloudflared)
        run: |
          Set-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Services\Tcpip\Parameters" -Name "IPEnableRouter" -Value 1

          Invoke-WebRequest https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi -OutFile ts.msi
          $installProcess = Start-Process msiexec.exe -ArgumentList "/i ts.msi /quiet /norestart" -Wait -PassThru -NoNewWindow
          $installProcess.WaitForExit()
          
          choco install speedtest cloudflared -y

          $paths = @("$env:ProgramFiles\Tailscale\tailscale.exe", "${env:ProgramFiles(x86)}\Tailscale\tailscale.exe")
          $ts = ""
          foreach ($p in $paths) { if (Test-Path $p) { $ts = $p; break } }
          
          echo "TS_PATH=$ts" >> $env:GITHUB_ENV
          & $ts up --authkey="${{ secrets.TAILSCALE_AUTH_KEY }}" --hostname="gh-runner-$env:GITHUB_RUN_ID" --advertise-exit-node --advertise-tags="tag:github" --accept-routes --unattended --reset
          Start-Sleep -Seconds 15

      - name: Get Tailscale IP
        run: |
          $ts = $env:TS_PATH
          $tsIP = & $ts ip -4
          echo "TAILSCALE_IP=$tsIP" >> $env:GITHUB_ENV

      - name: Run AzureBot Core Engine
        shell: pwsh
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GROQ_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12

          $botToken = $env:BOT_TOKEN
          $allowedId = $env:CHAT_ID
          $ipInfo = $env:TAILSCALE_IP
          $passInfo = $env:RDP_PASS
          $groqKey = $env:GROQ_KEY
          
          $blacklist = '(?i)^\s*(nano|vi|vim|htop|top|less|more|man|ssh|ftp|telnet|winver|notepad|calc|explorer|diskpart|wmic|nslookup)\b|^\s*(python|python3|node|php|mysql|sqlite3)\s*$'

          function Send-Msg ($msg) {
              try {
                  $payload = @{ 
                      chat_id = $allowedId; 
                      text = $msg; 
                      parse_mode = "HTML"; 
                      reply_markup = @{ remove_keyboard = $true } 
                  } | ConvertTo-Json -Depth 3
                  Invoke-RestMethod -Uri "https://api.telegram.org/bot$botToken/sendMessage" -Method Post -ContentType "application/json" -Body $payload | Out-Null
              } catch { Write-Host "Error SendMsg: $_" }
          }

          function Execute-WithTimeout ($exe, $argsList) {
              $pInfo = New-Object System.Diagnostics.ProcessStartInfo
              $pInfo.FileName = $exe
              $pInfo.Arguments = $argsList
              $pInfo.RedirectStandardOutput = $true
              $pInfo.RedirectStandardError = $true
              $pInfo.UseShellExecute = $false
              $pInfo.CreateNoWindow = $true

              $proc = New-Object System.Diagnostics.Process
              $proc.StartInfo = $pInfo
              
              $stdout = New-Object System.Text.StringBuilder
              $stderr = New-Object System.Text.StringBuilder

              try {
                  $proc.Start() | Out-Null
                  $stdoutScript = { while (-not $proc.StandardOutput.EndOfStream) { $stdout.AppendLine($proc.StandardOutput.ReadLine()) | Out-Null } }
                  $stderrScript = { while (-not $proc.StandardError.EndOfStream) { $stderr.AppendLine($proc.StandardError.ReadLine()) | Out-Null } }
                  
                  $hasExited = $proc.WaitForExit(15000)
                  if (-not $hasExited) {
                      $proc.Kill()
                      return "[TIMEOUT - 15s Limit Exceeded]`nProcess terpaksa dimatikan oleh Bot System.`n`nPartial Output:`n" + $proc.StandardOutput.ReadToEnd()
                  }
                  return $proc.StandardOutput.ReadToEnd() + $proc.StandardError.ReadToEnd()
              } catch {
                  return "Execution Error: $_"
              }
          }

          $menuCommands = @(
              @{command="help"; description="Tampilkan panduan command & instruksi AI"},
              @{command="status"; description="Cek beban CPU, RAM, Procie & Waktu VM"},
              @{command="ip"; description="Intip IP, Password & Akses Guacamole"},
              @{command="speedtest"; description="Uji kecepatan internet"},
              @{command="screenshot"; description="Intip layar RDP secara Live"},
              @{command="setup"; description="Instalasi GUI Apps, WSL & Guacamole WebRDP"},
              @{command="scanhost"; description="Nmap audit Windows Host Machine dari WSL"},
              @{command="bridgewsl"; description="Bridge port WSL ke public IP"},
              @{command="fetch"; description="Download file dari RDP ke HP"},
              @{command="kill"; description="Algojo pembunuh proses Windows/WSL"},
              @{command="cmd"; description="Remote CMD (Ketik manual via chat)"},
              @{command="ps"; description="Remote PowerShell (Ketik manual via chat)"},
              @{command="wsl"; description="Remote Ubuntu (Ketik manual via chat)"},
              @{command="expose"; description="Buka tunnel port (Ketik manual via chat)"}
          )
          try {
              $menuPayload = @{ commands = $menuCommands } | ConvertTo-Json -Depth 3
              Invoke-RestMethod -Uri "https://api.telegram.org/bot$botToken/setMyCommands" -Method Post -ContentType "application/json" -Body $menuPayload | Out-Null
          } catch { Write-Host "Error Set Menu: $_" }

          $initMsg = "[SYS] <b>AZURE WORKSTATION ACTIVE!</b>`n`n[KEY] <b>Kredensial RDP Shared:</b>`nIP: <code>$ipInfo</code>`nUser: <code>runneradmin</code>`nPass: <code>$passInfo</code>`nGuacamole: <code>Belum di-setup (Ketik /setup)</code>`n`nKlik tombol <b>Menu</b> di pojok kiri bawah untuk navigasi. Kamu juga bisa chat langsung dengan saya tanpa simbol / untuk berinteraksi!"
          Send-Msg $initMsg

          $offset = 0
          while ($true) {
              try {
                  $updates = Invoke-RestMethod -Uri "https://api.telegram.org/bot$botToken/getUpdates?offset=$offset&timeout=30" -TimeoutSec 35
                  foreach ($update in $updates.result) {
                      $offset = $update.update_id + 1
                      $senderId = $update.message.from.id.ToString()

                      $text = $update.message.text
                      if ([string]::IsNullOrWhiteSpace($text)) { continue }

                      if ($text.StartsWith("/")) {
                          if ($senderId -ne $allowedId) {
                              try {
                                  $pld = @{ chat_id = $senderId; text = "[!] <b>Access Denied:</b> Kamu tidak memiliki izin mengeksekusi sistem ini."; parse_mode = "HTML" } | ConvertTo-Json
                                  Invoke-RestMethod -Uri "https://api.telegram.org/bot$botToken/sendMessage" -Method Post -ContentType "application/json" -Body $pld | Out-Null
                              } catch {}
                              continue
                          }

                          if ($update.message.document -ne $null) {
                              $doc = $update.message.document
                              $fName = $doc.file_name
                              $fId = $doc.file_id
                              Send-Msg "[SYS] Mendeteksi file masuk: <code>$fName</code>. Mengunduh ke Desktop RDP..."
                              try {
                                  $fInfo = Invoke-RestMethod -Uri "https://api.telegram.org/bot$botToken/getFile?file_id=$fId"
                                  $fPath = $fInfo.result.file_path
                                  $dUrl = "https://api.telegram.org/file/bot$botToken/$fPath"
                                  $targetPath = "C:\Users\runneradmin\Desktop\$fName"
                                  Invoke-WebRequest -Uri $dUrl -OutFile $targetPath -UseBasicParsing
                                  Send-Msg "[V] <b>Upload Sukses!</b>`nFile mendarat di: <code>$targetPath</code>"
                              } catch { Send-Msg "[X] Gagal mendownload file: $_" }
                              continue
                          }

                          switch -Regex ($text) {
                              "^/(start|help)" {
                                  Send-Msg "[INFO] <b>COMMAND CENTER v5.0 (Azure Workstation)</b>`n`n- /status : Cek Procie, CPU, RAM & Sisa Waktu VM`n- /ip : Intip IP, Password & Link Guacamole WebRDP`n- /speedtest : Uji kecepatan internet Azure`n- /screenshot : Intip layar RDP secara Live`n- /setup : Instalasi GUI Apps, Tweak UI, WSL & Guacamole`n- /scanhost : Auto Nmap scan Windows host machine dari WSL`n- /bridgewsl [port] : Expose port WSL ke Tailscale IP`n- /fetch [path] : Sedot file dari RDP ke HP`n- /kill [nama] : Tebas paksa proses Windows/WSL`n- /cmd [cmd] : Remote Windows Console`n- /ps [cmd] : Remote PowerShell`n- /wsl [cmd] : Remote Ubuntu Terminal`n- /expose [port] : Buka tunnel port umum via Cloudflare`n`n💡 <b>AzureBot AI (GPT-OSS-120B):</b> Kirim chat teks biasa tanpa awalan / untuk mengobrol secara langsung dengan saya!"
                              }
                              "^/ip" { 
                                  $guacLink = "Belum di-setup (Ketik /setup)"
                                  if (Test-Path "C:\guac-url.txt") { $guacLink = Get-Content "C:\guac-url.txt" }
                                  Send-Msg "[KEY] <b>Kredensial RDP:</b>`nIP: <code>$ipInfo</code>`nUser: <code>runneradmin</code>`nPass: <code>$passInfo</code>`nGuacamole: <code>$guacLink</code>`n`n[WSL] Bypass: <code>ssh rdp@$ipInfo -p 8022</code>" 
                              }
                              "^/status" { 
                                  $procInstance = Get-CimInstance Win32_Processor
                                  $cpuName = ($procInstance | Select-Object -First 1).Name.Trim()
                                  $cpuLoad = ($procInstance | Measure-Object -Property LoadPercentage -Average).Average
                                  $os = Get-CimInstance Win32_OperatingSystem
                                  $totalRam = [math]::Round($os.TotalVisibleMemorySize / 1024 / 1024, 2)
                                  $freeRam = [math]::Round($os.FreePhysicalMemory / 1024 / 1024, 2)
                                  $usedRam = $totalRam - $freeRam
                                  $up = (Get-Date) - $os.LastBootUpTime
                                  $upStr = "$($up.Hours) Jam, $($up.Minutes) Menit"
                                  $remMins = 360 - $up.TotalMinutes
                                  if ($remMins -lt 0) { $remMins = 0 }
                                  $remTimeSpan = [timespan]::fromminutes($remMins)
                                  $remStr = "$($remTimeSpan.Hours) Jam, $($remTimeSpan.Minutes) Menit"
                                  Send-Msg "[STATS] <b>SYSTEM HEALTH</b>`n- CPU Model: <code>$cpuName</code>`n- CPU Load: $cpuLoad%`n- RAM: $usedRam GB / $totalRam GB`n- Free: $freeRam GB`n- Uptime: $upStr`n- Sisa VM: $remStr"
                              }
                              "^/speedtest" {
                                  Send-Msg "[NET] Menjalankan Speedtest Ookla (15 detik)..."
                                  $out = (speedtest.exe --accept-license --accept-gdpr 2>&1 | Out-String).Replace("<", "&lt;").Replace(">", "&gt;")
                                  Send-Msg "[NET] <b>Hasil Speedtest:</b>`n<pre>$out</pre>"
                              }
                              "^/scanhost" {
                                  Send-Msg "[NET] Mengeksekusi Nmap audit ke Windows Host Machine dari dalam WSL..."
                                  $rawOut = Execute-WithTimeout "wsl.exe" "-d Ubuntu-22.04 -u root bash -c `"nmap `$(ip -4 route show default | cut -d' ' -f3) 2>&1`""
                                  $out = $rawOut.Replace("<", "&lt;").Replace(">", "&gt;")
                                  Send-Msg "[SCAN] <b>Hasil Scan Host:</b>`n<pre>$out</pre>"
                              }
                              "^/setup" {
                                  $wslCheck = wsl.exe -l -q 2>$null
                                  if (-not [string]::IsNullOrWhiteSpace($wslCheck)) {
                                      Send-Msg "[V] GUI Apps & WSL tampaknya sudah aktif."
                                  } else {
                                      Send-Msg "[SYS] <b>Mengeksekusi Workstation Suite...</b>`n- Tweak UI & 4K Dark Wallpaper`n- Brave Browser & VSCode`n- WSL Ubuntu 22.04 & SSH Engine`n- Docker Engine & Apache Guacamole WebRDP`n`nBerjalan di background (3-5 menit)."
                                      
                                      $guacScriptArray = @(
                                          "export DEBIAN_FRONTEND=noninteractive"
                                          "apt-get install docker.io -y"
                                          "mkdir -p /etc/guacamole"
                                          "WIN_IP=`$(`ip -4 route show default | cut -d' ' -f3`)"
                                          "cat <<EOF > /etc/guacamole/user-mapping.xml"
                                          "<user-mapping>"
                                          "  <authorize username=`"runneradmin`" password=`"$passInfo`">"
                                          "    <connection name=`"Azure Workstation GUI`">"
                                          "      <protocol>rdp</protocol>"
                                          "      <param name=`"hostname`">`$WIN_IP</param>"
                                          "      <param name=`"port`">3389</param>"
                                          "      <param name=`"username`">runneradmin</param>"
                                          "      <param name=`"password`">$passInfo</param>"
                                          "      <param name=`"security`">any</param>"
                                          "      <param name=`"ignore-cert`">true</param>"
                                          "    </connection>"
                                          "  </authorize>"
                                          "</user-mapping>"
                                          "EOF"
                                          "docker network create guacnet || true"
                                          "docker run -d --restart always --name guacd --network guacnet guacamole/guacd"
                                          "docker run -d --restart always --name guacamole --network guacnet -e GUACD_HOSTNAME=guacd -p 9000:8080 -v /etc/guacamole/user-mapping.xml:/etc/guacamole/user-mapping.xml guacamole/guacamole"
                                      )
                                      $guacScriptArray -join "`n" | Set-Content -Path "C:\guac-setup.sh" -Encoding ASCII

                                      Start-Job -ScriptBlock {
                                          Set-ItemProperty -Path "HKCU:\SOFTWARE\Microsoft\Windows\CurrentVersion\Themes\Personalize" -Name "AppsUseLightTheme" -Value 0
                                          Set-ItemProperty -Path "HKCU:\SOFTWARE\Microsoft\Windows\CurrentVersion\Themes\Personalize" -Name "SystemUsesLightTheme" -Value 0
                                          Set-ItemProperty -Path "HKCU:\SOFTWARE\Microsoft\Windows\CurrentVersion\Themes\Personalize" -Name "EnableTransparency" -Value 1
                                          Set-ItemProperty -Path "HKCU:\SOFTWARE\Microsoft\Windows\CurrentVersion\Themes\Personalize" -Name "ColorPrevalence" -Value 0
                                          
                                          $url = "https://4kwallpapers.com/images/wallpapers/windows-11-dark-mode-abstract-background-black-background-7680x4320-8710.png"
                                          $img = "$env:TEMP\wallpaper.png"
                                          try {
                                              Invoke-WebRequest -Uri $url -OutFile $img -UseBasicParsing -TimeoutSec 15
                                              Add-Type -TypeDefinition "using System; using System.Runtime.InteropServices; public class WP { [DllImport(`"user32.dll`", CharSet=CharSet.Auto)] public static extern int SystemParametersInfo(int uA, int uP, string lpv, int fu); public static void Set(string p) { SystemParametersInfo(20, 0, p, 3); } }"
                                              [WP]::Set($img)
                                          } catch {
                                              Set-ItemProperty -Path "HKCU:\Control Panel\Colors" -Name "Background" -Value "0 0 0"
                                              Set-ItemProperty -Path "HKCU:\Control Panel\Desktop" -Name "WallPaper" -Value ""
                                          }
                                          Stop-Process -Name explorer -Force -ErrorAction SilentlyContinue
                                          Start-Sleep -Seconds 2
                                          Start-Process explorer.exe -ErrorAction SilentlyContinue
                                          
                                          choco install brave vscode -y
                                          wsl --install -d Ubuntu-22.04 --no-launch
                                          Start-Sleep 15
                                          wsl -d Ubuntu-22.04 -u root bash -c "useradd -m -s /bin/bash rdp && echo 'rdp:root' | chpasswd && usermod -aG sudo rdp"
                                          wsl -d Ubuntu-22.04 -u root bash -c "echo -e '[user]\ndefault=rdp\n[boot]\nsystemd=true' > /etc/wsl.conf"
                                          wsl -t Ubuntu-22.04
                                          Start-Sleep 5
                                          wsl -d Ubuntu-22.04 -u root bash -c "apt update -y && DEBIAN_FRONTEND=noninteractive apt install neofetch nmap openssh-server -y"
                                          wsl -d Ubuntu-22.04 -u root bash -c "echo '' >> /etc/ssh/sshd_config && echo 'ListenAddress 0.0.0.0' >> /etc/ssh/sshd_config && echo 'Port 8022' >> /etc/ssh/sshd_config && echo 'PasswordAuthentication yes' >> /etc/ssh/sshd_config"
                                          
                                          $wslIP = ((wsl -d Ubuntu-22.04 -u root bash -c "hostname -I") -split '\s+')[0].Trim()
                                          netsh interface portproxy add v4tov4 listenport=8022 listenaddress=0.0.0.0 connectport=8022 connectaddress=$wslIP
                                          netsh advfirewall firewall add rule name="WSL-SSH-Bypass" dir=in action=allow protocol=TCP localport=8022
                                          Start-Process powershell.exe -ArgumentList "-ExecutionPolicy Bypass -WindowStyle Hidden -Command `"wsl -d Ubuntu-22.04 -u root /usr/sbin/sshd -D`"" -NoNewWindow

                                          wsl -d Ubuntu-22.04 -u root bash -c "tr -d '\r' < /mnt/c/guac-setup.sh > /root/setup_guac.sh && bash /root/setup_guac.sh"
                                          
                                          netsh interface portproxy add v4tov4 listenport=9000 listenaddress=0.0.0.0 connectport=9000 connectaddress=$wslIP
                                          netsh advfirewall firewall add rule name="WSL-Guacamole" dir=in action=allow protocol=TCP localport=9000

                                          Start-Process cmd.exe -ArgumentList "/c cloudflared tunnel --url http://localhost:9000 > C:\cf-guac.log 2>&1" -WindowStyle Hidden
                                          Start-Sleep -Seconds 12
                                          $cfLog = Get-Content "C:\cf-guac.log" -Raw
                                          if ($cfLog -match "(https://[a-zA-Z0-9-]+\.trycloudflare\.com)") {
                                              $guacUrl = $matches[1] + "/guacamole/"
                                              Set-Content -Path "C:\guac-url.txt" -Value $guacUrl -Encoding UTF8
                                              $payload = @{ 
                                                  chat_id = "$using:allowedId"; 
                                                  text = "[V] <b>GUI Deployment Sukses!</b>`nApache Guacamole WebRDP aktif.`nURL: <code>$guacUrl</code>"; 
                                                  parse_mode = "HTML"
                                              } | ConvertTo-Json -Depth 3
                                              Invoke-RestMethod -Uri "https://api.telegram.org/bot$using:botToken/sendMessage" -Method Post -ContentType "application/json" -Body $payload | Out-Null
                                          }
                                      } | Out-Null
                                  }
                              }
                              "^/bridgewsl (\d+)" {
                                  $port = $matches[1]
                                  $wslCheck = wsl.exe -l -q 2>$null
                                  if ([string]::IsNullOrWhiteSpace($wslCheck)) {
                                      Send-Msg "[X] <b>WSL belum terinstal!</b>"
                                  } else {
                                      $wslIP = ((wsl -d Ubuntu-22.04 -u root bash -c "hostname -I") -split '\s+')[0].Trim()
                                      netsh interface portproxy add v4tov4 listenport=$port listenaddress=0.0.0.0 connectport=$port connectaddress=$wslIP
                                      netsh advfirewall firewall add rule name="WSL-Bridge-$port" dir=in action=allow protocol=TCP localport=$port
                                      Send-Msg "[NET] <b>WSL Port $port Bridged!</b>`nBuka browser HP-mu ke: <code>http://$ipInfo`:$port</code>"
                                  }
                              }
                              "^/fetch (.+)" {
                                  $fPath = $matches[1].Trim()
                                  if (Test-Path $fPath) {
                                      Send-Msg "[SYS] Mengirimkan berkas <code>$fPath</code> ke Telegram..."
                                      curl.exe -s -F "chat_id=$allowedId" -F "document=@$fPath" "https://api.telegram.org/bot$botToken/sendDocument" | Out-Null
                                  } else { Send-Msg "[X] File tidak ditemukan di path: <code>$fPath</code>" }
                              }
                              "^/kill (.+)" {
                                  $pName = $matches[1].Trim()
                                  Send-Msg "[💀] Menjalankan operasi algojo untuk memburu proses: <code>$pName</code>..."
                                  $winOut = (taskkill.exe /F /IM "${pName}.exe" /T 2>&1 | Out-String).Trim()
                                  $linuxOut = ""
                                  $wslCheck = wsl.exe -l -q 2>$null
                                  if (-not [string]::IsNullOrWhiteSpace($wslCheck)) {
                                      $linuxOut = (wsl.exe -d Ubuntu-22.04 -u root bash -c "pkill -9 -f $pName" 2>&1 | Out-String).Trim()
                                  }
                                  Send-Msg "[💀] <b>Hasil Eksekusi:</b>`nWindows: <pre>$winOut</pre>`nWSL: <pre>$linuxOut</pre>"
                              }
                              "^/cmd (.+)" { 
                                  $cmd = $matches[1]
                                  if ($cmd -match $blacklist) {
                                      Send-Msg "[!] <b>Command Blocked:</b>`nAplikasi '$cmd' dicekal karena memicu deadlock."
                                  } else {
                                      $rawOut = Execute-WithTimeout "cmd.exe" "/c `"$cmd 2>&1`""
                                      $out = $rawOut.Replace("<", "&lt;").Replace(">", "&gt;")
                                      Send-Msg "[CMD] <b>Output:</b>`n<pre>$out</pre>"
                                  }
                              }
                              "^/ps (.+)" { 
                                  $cmd = $matches[1]
                                  if ($cmd -match $blacklist) {
                                      Send-Msg "[!] <b>Command Blocked:</b>`nAplikasi '$cmd' dicekal karena memicu deadlock."
                                  } else {
                                      $rawOut = Execute-WithTimeout "powershell.exe" "-Command `"$cmd`""
                                      $out = $rawOut.Replace("<", "&lt;").Replace(">", "&gt;")
                                      Send-Msg "[PS] <b>Output:</b>`n<pre>$out</pre>"
                                  }
                              }
                              "^/wsl (.+)" { 
                                  $cmd = $matches[1]
                                  $wslCheck = wsl.exe -l -q 2>$null
                                  if ([string]::IsNullOrWhiteSpace($wslCheck)) {
                                      Send-Msg "[X] <b>WSL belum terinstal!</b>`nTekan tombol atau ketik <code>/setup</code> terlebih dahulu."
                                  } elseif ($cmd -match $blacklist) {
                                      Send-Msg "[!] <b>Command Blocked:</b>`nAplikasi '$cmd' dicekal karena memicu deadlock."
                                  } else {
                                      $rawOut = Execute-WithTimeout "wsl.exe" "-d Ubuntu-22.04 -u root bash -c `"$cmd 2>&1`""
                                      $out = $rawOut.Replace("<", "&lt;").Replace(">", "&gt;")
                                      Send-Msg "[WSL] <b>Output:</b>`n<pre>$out</pre>"
                                  }
                              }
                              "^/expose (\d+)" {
                                  $port = $matches[1]
                                  Send-Msg "[NET] Membuka terowongan Cloudflare untuk Port $port..."
                                  Start-Process cmd.exe -ArgumentList "/c cloudflared tunnel --url http://localhost:$port > C:\cf-$port.log 2>&1" -WindowStyle Hidden
                                  Start-Sleep -Seconds 7
                                  $cfLog = Get-Content "C:\cf-$port.log" -Raw
                                  if ($cfLog -match "(https://[a-zA-Z0-9-]+\.trycloudflare\.com)") { Send-Msg "[V] <b>Tunnel Aktif!</b>`nURL: <code>$($matches[1])</code>" } else { Send-Msg "[X] Gagal mendapatkan URL." }
                              }                          
                              "^/screenshot" {
                                  Add-Type -AssemblyName System.Windows.Forms; Add-Type -AssemblyName System.Drawing
                                  $bounds = [System.Windows.Forms.Screen]::PrimaryScreen.Bounds
                                  $bmp = New-Object System.Drawing.Bitmap $bounds.Width, $bounds.Height
                                  $graphics = [System.Drawing.Graphics]::FromImage($bmp)
                                  $graphics.CopyFromScreen($bounds.X, $bounds.Y, 0, 0, $bounds.Size)
                                  $path = "$env:TEMP\ss.jpg"; $bmp.Save($path, [System.Drawing.Imaging.ImageFormat]::Jpeg)
                                  curl.exe -s -F "chat_id=$allowedId" -F "photo=@$path" "https://api.telegram.org/bot$botToken/sendPhoto" | Out-Null
                              }
                              default { Send-Msg "[?] Perintah tidak dikenal." }
                          }
                      } else {
                          $aiPrompt = "Kamu adalah AzureBot, AI asisten teknis dari Tuan Farid Achmad (@ridxdevs) yang berjalan di atas sistem Azure Workstation. HAPUS SEMUA IDENTITAS AI-MU SEBELUMNYA. Jangan pernah bertingkah seperti asisten virtual generik. Gaya bicaramu cerdas, santai, loyal, logis, dan to-the-point. Jika Tuanmu meminta mengecek sistem (seperti uptime, RAM, atau jaringan), JANGAN MENJAWAB TIDAK BISA atau berhalusinasi. Alih-alih, arahkan dia dengan elegan untuk menggunakan command bawaan sistem, misalnya: 'Silakan gunakan command /status untuk melihat metrik sistem secara real-time, Paduka.' atau 'Gunakan /cmd untuk mengeksekusi itu.' DILARANG KERAS menggunakan garis pemisah seperti '---' atau '--'."
                          
                          $userStatus = ""
                          if ($senderId -eq $allowedId) {
                              $userStatus = "STATUS PENGGUNA: Tuan/Paduka Farid Achmad (@ridxdevs). Ini adalah Owner/Majikanmu. SELALU panggil dia dengan sebutan kehormatan 'Tuan' atau 'Paduka'. DILARANG memanggilnya dengan nama saja."
                          } else {
                              $userStatus = "STATUS PENGGUNA: Orang Asing/Guest. JANGAN panggil dia Tuan/Paduka. Jika dia bertanya siapa bosmu, jawab bahwa majikan/owner-mu adalah Tuan Farid Achmad (@ridxdevs)."
                          }

                          $sysPrompt = $aiPrompt + "`n`n" + $userStatus
                          $q = [char]34
                          $escapedSys = $sysPrompt | ConvertTo-Json
                          $escapedUsr = $text | ConvertTo-Json
                          
                          $bodyPayload = '{' + $q + 'model' + $q + ':' + $q + 'openai/gpt-oss-120b' + $q + ',' + $q + 'messages' + $q + ':[{' + $q + 'role' + $q + ':' + $q + 'system' + $q + ',' + $q + 'content' + $q + ':' + $escapedSys + '},{' + $q + 'role' + $q + ':' + $q + 'user' + $q + ',' + $q + 'content' + $q + ':' + $escapedUsr + '}]}'
                          
                          try {
                              $headers = @{
                                  "Authorization" = "Bearer $groqKey"
                                  "Content-Type"  = "application/json"
                              }
                              $aiRes = Invoke-RestMethod -Uri "https://api.groq.com/openai/v1/chat/completions" -Method Post -Headers $headers -Body $bodyPayload -TimeoutSec 15
                              $aiText = $aiRes.choices[0].message.content
                              
                              if (-not [string]::IsNullOrWhiteSpace($aiText)) {
                                  $aiText = $aiText.Replace('&', '&amp;').Replace('<', '&lt;').Replace('>', '&gt;')
                                  $aiText = $aiText -replace '(?s)```\w*\n?(.*?)```', '<pre>$1</pre>'
                                  $aiText = $aiText -replace '(?s)`([^`]+)`', '<code>$1</code>'
                                  
                                  try {
                                      $pld = @{ chat_id = $senderId; text = $aiText; parse_mode = "HTML" } | ConvertTo-Json
                                      Invoke-RestMethod -Uri "https://api.telegram.org/bot$botToken/sendMessage" -Method Post -ContentType "application/json" -Body $pld | Out-Null
                                  } catch {}
                              }
                          } catch {
                              try {
                                  $errorMsg = "[AzureBot Groq Error] API Error: " + $_.Exception.Message
                                  $pld = @{ chat_id = $senderId; text = $errorMsg } | ConvertTo-Json
                                  Invoke-RestMethod -Uri "https://api.telegram.org/bot$botToken/sendMessage" -Method Post -ContentType "application/json" -Body $pld | Out-Null
                              } catch {}
                          }
                      }
                  }
              } catch { Start-Sleep -Seconds 5 }
          }

      - name: Cleanup Tailscale
        if: always()
        run: |
          $ts = $env:TS_PATH
          if ($ts -ne $null -and (Test-Path $ts)) {
              & $ts logout
          }
