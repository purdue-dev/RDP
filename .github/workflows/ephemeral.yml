name: RDP-v3.5-AzureFinale

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *' 

concurrency:
  group: tailscale-exit-node
  cancel-in-progress: true

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:

      - name: Enable RDP & OpenSSH Server
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          netsh advfirewall firewall add rule name="RDP-Tailscale" dir=in action=allow protocol=TCP localport=3389
          Restart-Service -Name TermService -Force
          
          Add-WindowsCapability -Online -Name OpenSSH.Server~~~~0.0.1.0
          Start-Service sshd
          Set-Service -Name sshd -StartupType 'Automatic'
          netsh advfirewall firewall add rule name="OpenSSH-Server-In-TCP" dir=in action=allow protocol=TCP localport=22

      - name: Configure Shared-Session Password (runneradmin)
        run: |
          $chars = (48..57) + (65..90) + (97..122)
          $password = -join ($chars | Get-Random -Count 20 | ForEach-Object {[char]$_})
          
          $netCmd = "net user runneradmin $password"
          cmd.exe /c $netCmd

          echo "RDP_USER=runneradmin" >> $env:GITHUB_ENV
          echo "RDP_PASS=$password" >> $env:GITHUB_ENV

      - name: Install Network Core (Tailscale, Speedtest, Cloudflared)
        run: |
          Set-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Services\Tcpip\Parameters" -Name "IPEnableRouter" -Value 1

          Invoke-WebRequest https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi -OutFile ts.msi
          $installProcess = Start-Process msiexec.exe -ArgumentList "/i ts.msi /quiet /norestart" -Wait -PassThru -NoNewWindow
          $installProcess.WaitForExit()
          
          choco install speedtest cloudflared -y

          $paths = @("$env:ProgramFiles\Tailscale\tailscale.exe", "${env:ProgramFiles(x86)}\Tailscale\tailscale.exe")
          $ts = ""
          foreach ($p in $paths) { if (Test-Path $p) { $ts = $p; break } }
          
          echo "TS_PATH=$ts" >> $env:GITHUB_ENV
          & $ts up --authkey="${{ secrets.TAILSCALE_AUTH_KEY }}" --hostname="gh-runner-$env:GITHUB_RUN_ID" --advertise-exit-node --advertise-tags="tag:github" --accept-routes --unattended --reset
          Start-Sleep -Seconds 15

      - name: Get Tailscale IP
        run: |
          $ts = $env:TS_PATH
          $tsIP = & $ts ip -4
          echo "TAILSCALE_IP=$tsIP" >> $env:GITHUB_ENV

      - name: RUN COMMAND CENTER (Bot Engine)
        run: |
          $botScriptCode = @'
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12

          $botToken = "___BOT_TOKEN___"
          $allowedId = "___CHAT_ID___"
          $ipInfo = "___IP___"
          $passInfo = "___PASS___"
          
          # Master Regex Blacklist: Blokir GUI, TUI, dan REPL interaktif
          $blacklist = '(?i)^\s*(nano|vi|vim|htop|top|less|more|man|ssh|ftp|telnet|winver|notepad|calc|explorer|diskpart|wmic|nslookup|ping\s+-t)\b|^\s*(python|python3|node|php|mysql|sqlite3)\s*$'

          function Send-Msg ($msg) {
              try {
                  $payload = @{ 
                      chat_id = $allowedId; 
                      text = $msg; 
                      parse_mode = "HTML"; 
                      reply_markup = @{ remove_keyboard = $true } 
                  } | ConvertTo-Json -Depth 3
                  Invoke-RestMethod -Uri "https://api.telegram.org/bot$botToken/sendMessage" -Method Post -ContentType "application/json" -Body $payload | Out-Null
              } catch { Write-Host "Error SendMsg: $_" }
          }

          Write-Host "Membangun Native Command Menu Telegram..."
          $menuCommands = @(
              @{command="help"; description="Tampilkan panduan command"},
              @{command="status"; description="Cek beban CPU, RAM & Waktu VM"},
              @{command="ip"; description="Intip IP & Password RDP"},
              @{command="speedtest"; description="Uji kecepatan internet"},
              @{command="screenshot"; description="Intip layar RDP secara Live"},
              @{command="setup"; description="Instalasi GUI Apps & WSL"},
              @{command="bridgewsl"; description="Bridge port WSL ke public IP"},
              @{command="cmd"; description="Remote CMD (Ketik manual via chat)"},
              @{command="ps"; description="Remote PowerShell (Ketik manual via chat)"},
              @{command="wsl"; description="Remote Ubuntu (Ketik manual via chat)"},
              @{command="expose"; description="Buka tunnel port (Ketik manual via chat)"}
          )
          try {
              $menuPayload = @{ commands = $menuCommands } | ConvertTo-Json -Depth 3
              Invoke-RestMethod -Uri "https://api.telegram.org/bot$botToken/setMyCommands" -Method Post -ContentType "application/json" -Body $menuPayload | Out-Null
          } catch { Write-Host "Error Set Menu: $_" }

          $initMsg = "[SYS] <b>AZURE FINALE WORKSTATION ACTIVE!</b>`n`n[KEY] <b>Kredensial RDP Shared:</b>`nIP: <code>$ipInfo</code>`nUser: <code>runneradmin</code>`nPass: <code>$passInfo</code>`n`nKlik tombol <b>Menu</b> di pojok kiri bawah untuk navigasi."
          Send-Msg $initMsg

          $offset = 0
          while ($true) {
              try {
                  $updates = Invoke-RestMethod -Uri "https://api.telegram.org/bot$botToken/getUpdates?offset=$offset&timeout=30" -TimeoutSec 35
                  foreach ($update in $updates.result) {
                      $offset = $update.update_id + 1
                      $senderId = $update.message.from.id.ToString()
                      $text = $update.message.text

                      if ($senderId -ne $allowedId) { continue }
                      if ([string]::IsNullOrWhiteSpace($text)) { continue }

                      switch -Regex ($text) {
                          "^/(start|help)" {
                              Send-Msg "[INFO] <b>COMMAND CENTER v3.5 (Azure Finale)</b>`n`n- /status : Cek CPU, RAM & Sisa Waktu VM`n- /ip : Intip IP & Password RDP`n- /speedtest : Uji kecepatan internet Azure`n- /screenshot : Intip layar RDP secara Live`n- /setup : Instalasi GUI Apps, Tweak UI & WSL`n- /bridgewsl [port] : Expose port WSL ke Tailscale IP`n- /cmd [cmd] : Remote Windows Console`n- /ps [cmd] : Remote PowerShell`n- /wsl [cmd] : Remote Ubuntu Terminal"
                          }
                          "^/ip" { Send-Msg "[KEY] <b>Kredensial RDP:</b>`nIP: <code>$ipInfo</code>`nUser: <code>runneradmin</code>`nPass: <code>$passInfo</code>`n`n[WSL] Bypass: <code>ssh rdp@$ipInfo -p 8022</code>" }
                          "^/status" { 
                              $cpu = (Get-CimInstance Win32_Processor | Measure-Object -Property LoadPercentage -Average).Average
                              $os = Get-CimInstance Win32_OperatingSystem
                              
                              $totalRam = [math]::Round($os.TotalVisibleMemorySize / 1024 / 1024, 2)
                              $freeRam = [math]::Round($os.FreePhysicalMemory / 1024 / 1024, 2)
                              $usedRam = $totalRam - $freeRam
                              
                              $up = (Get-Date) - $os.LastBootUpTime
                              $upStr = "$($up.Hours) Jam, $($up.Minutes) Menit"
                              
                              $remMins = 360 - $up.TotalMinutes
                              if ($remMins -lt 0) { $remMins = 0 }
                              $remTimeSpan = [timespan]::fromminutes($remMins)
                              $remStr = "$($remTimeSpan.Hours) Jam, $($remTimeSpan.Minutes) Menit"
                              
                              Send-Msg "[STATS] <b>SYSTEM HEALTH</b>`n- CPU: $cpu%`n- RAM: $usedRam GB / $totalRam GB`n- Free: $freeRam GB`n- Uptime: $upStr`n- Sisa VM: $remStr"
                          }
                          "^/speedtest" {
                              Send-Msg "[NET] Menjalankan Speedtest Ookla (15 detik)..."
                              $out = (speedtest.exe --accept-license --accept-gdpr 2>&1 | Out-String).Replace("<", "&lt;").Replace(">", "&gt;")
                              Send-Msg "[NET] <b>Hasil Speedtest:</b>`n<pre>$out</pre>"
                          }
                          "^/setup" {
                              $wslCheck = wsl.exe -l -q 2>$null
                              if (-not [string]::IsNullOrWhiteSpace($wslCheck)) {
                                  Send-Msg "[V] GUI Apps & WSL tampaknya sudah aktif."
                              } else {
                                  Send-Msg "[SYS] <b>Mengeksekusi Workstation Suite...</b>`n- Tweak UI & 4K Dark Wallpaper`n- Brave Browser & VSCode`n- WSL Ubuntu 22.04 & SSH`n`nBerjalan di background (3-5 menit)."
                                  Start-Job -ScriptBlock {
                                      # TWEAK UI DARK MODE & WALLPAPER
                                      Set-ItemProperty -Path "HKCU:\SOFTWARE\Microsoft\Windows\CurrentVersion\Themes\Personalize" -Name "AppsUseLightTheme" -Value 0
                                      Set-ItemProperty -Path "HKCU:\SOFTWARE\Microsoft\Windows\CurrentVersion\Themes\Personalize" -Name "SystemUsesLightTheme" -Value 0
                                      Set-ItemProperty -Path "HKCU:\SOFTWARE\Microsoft\Windows\CurrentVersion\Themes\Personalize" -Name "EnableTransparency" -Value 1
                                      Set-ItemProperty -Path "HKCU:\SOFTWARE\Microsoft\Windows\CurrentVersion\Themes\Personalize" -Name "ColorPrevalence" -Value 0
                                      
                                      $url = "https://4kwallpapers.com/images/wallpapers/windows-11-dark-mode-abstract-background-black-background-7680x4320-8710.png"
                                      $img = "$env:TEMP\wallpaper.png"
                                      try {
                                          Invoke-WebRequest -Uri $url -OutFile $img -UseBasicParsing -TimeoutSec 15
                                          Add-Type -TypeDefinition "using System; using System.Runtime.InteropServices; public class WP { [DllImport(`"user32.dll`", CharSet=CharSet.Auto)] public static extern int SystemParametersInfo(int uA, int uP, string lpv, int fu); public static void Set(string p) { SystemParametersInfo(20, 0, p, 3); } }"
                                          [WP]::Set($img)
                                      } catch {
                                          Set-ItemProperty -Path "HKCU:\Control Panel\Colors" -Name "Background" -Value "0 0 0"
                                          Set-ItemProperty -Path "HKCU:\Control Panel\Desktop" -Name "WallPaper" -Value ""
                                      }
                                      Stop-Process -Name explorer -Force -ErrorAction SilentlyContinue
                                      Start-Sleep -Seconds 2
                                      Start-Process explorer.exe -ErrorAction SilentlyContinue
                                      
                                      # INSTALASI GUI APPS
                                      choco install brave vscode -y
                                      
                                      # INSTALASI WSL
                                      wsl --install -d Ubuntu-22.04 --no-launch
                                      Start-Sleep 15
                                      wsl -d Ubuntu-22.04 -u root bash -c "useradd -m -s /bin/bash rdp && echo 'rdp:root' | chpasswd && usermod -aG sudo rdp"
                                      wsl -d Ubuntu-22.04 -u root bash -c "echo -e '[user]\ndefault=rdp\n[boot]\nsystemd=true' > /etc/wsl.conf"
                                      wsl -t Ubuntu-22.04
                                      Start-Sleep 5
                                      wsl -d Ubuntu-22.04 -u root bash -c "apt update -y && DEBIAN_FRONTEND=noninteractive apt install neofetch nmap openssh-server -y"
                                      wsl -d Ubuntu-22.04 -u root bash -c "echo '' >> /etc/ssh/sshd_config && echo 'ListenAddress 0.0.0.0' >> /etc/ssh/sshd_config && echo 'Port 8022' >> /etc/ssh/sshd_config && echo 'PasswordAuthentication yes' >> /etc/ssh/sshd_config"
                                      
                                      $wslIP = ((wsl -d Ubuntu-22.04 -u root bash -c "hostname -I") -split '\s+')[0].Trim()
                                      netsh interface portproxy add v4tov4 listenport=8022 listenaddress=0.0.0.0 connectport=8022 connectaddress=$wslIP
                                      netsh advfirewall firewall add rule name="WSL-SSH-Bypass" dir=in action=allow protocol=TCP localport=8022
                                      
                                      Start-Process powershell.exe -ArgumentList "-ExecutionPolicy Bypass -WindowStyle Hidden -Command `"wsl -d Ubuntu-22.04 -u root /usr/sbin/sshd -D`"" -NoNewWindow
                                  } | Out-Null
                              }
                          }
                          "^/bridgewsl (\d+)" {
                              $port = $matches[1]
                              $wslCheck = wsl.exe -l -q 2>$null
                              if ([string]::IsNullOrWhiteSpace($wslCheck)) {
                                  Send-Msg "[X] <b>WSL belum terinstal!</b>"
                              } else {
                                  $wslIP = ((wsl -d Ubuntu-22.04 -u root bash -c "hostname -I") -split '\s+')[0].Trim()
                                  netsh interface portproxy add v4tov4 listenport=$port listenaddress=0.0.0.0 connectport=$port connectaddress=$wslIP
                                  netsh advfirewall firewall add rule name="WSL-Bridge-$port" dir=in action=allow protocol=TCP localport=$port
                                  Send-Msg "[NET] <b>WSL Port $port Bridged!</b>`nBuka browser HP-mu ke: <code>http://$ipInfo`:$port</code>"
                              }
                          }
                          "^/cmd (.+)" { 
                              $cmd = $matches[1]
                              if ($cmd -match $blacklist) {
                                  Send-Msg "[!] <b>Command Blocked:</b>`nAplikasi '$cmd' dicekal karena memicu deadlock (GUI/Interactive)."
                              } else {
                                  $out = (cmd.exe /c "$cmd 2>&1" | Out-String).Replace("<", "&lt;").Replace(">", "&gt;")
                                  Send-Msg "[CMD] <b>Output:</b>`n<pre>$out</pre>"
                              }
                          }
                          "^/ps (.+)" { 
                              $cmd = $matches[1]
                              if ($cmd -match $blacklist) {
                                  Send-Msg "[!] <b>Command Blocked:</b>`nAplikasi '$cmd' dicekal karena memicu deadlock (GUI/Interactive)."
                              } else {
                                  $out = (powershell.exe -Command "$cmd" 2>&1 | Out-String).Replace("<", "&lt;").Replace(">", "&gt;")
                                  Send-Msg "[PS] <b>Output:</b>`n<pre>$out</pre>"
                              }
                          }
                          "^/wsl (.+)" { 
                              $cmd = $matches[1]
                              $wslCheck = wsl.exe -l -q 2>$null
                              if ([string]::IsNullOrWhiteSpace($wslCheck)) {
                                  Send-Msg "[X] <b>WSL belum terinstal!</b>`nTekan tombol atau ketik <code>/setup</code> terlebih dahulu."
                              } elseif ($cmd -match $blacklist) {
                                  Send-Msg "[!] <b>Command Blocked:</b>`nAplikasi '$cmd' dicekal karena memicu deadlock (GUI/Interactive)."
                              } else {
                                  $out = (wsl -d Ubuntu-22.04 -u root bash -c "$cmd 2>&1" | Out-String).Replace("<", "&lt;").Replace(">", "&gt;")
                                  Send-Msg "[WSL] <b>Output:</b>`n<pre>$out</pre>"
                              }
                          }
                          "^/expose (\d+)" {
                              $port = $matches[1]
                              Send-Msg "[NET] Membuka terowongan Cloudflare untuk Port $port..."
                              Start-Process cmd.exe -ArgumentList "/c cloudflared tunnel --url http://localhost:$port > C:\cf-$port.log 2>&1" -WindowStyle Hidden
                              Start-Sleep 5
                              $cfLog = Get-Content "C:\cf-$port.log" -Raw
                              if ($cfLog -match "(https://[a-zA-Z0-9-]+\.trycloudflare\.com)") { Send-Msg "[V] <b>Tunnel Aktif!</b>`nURL: <code>$($matches[1])</code>" } else { Send-Msg "[X] Gagal mendapatkan URL." }
                          }
                          "^/screenshot" {
                              Add-Type -AssemblyName System.Windows.Forms; Add-Type -AssemblyName System.Drawing
                              $bmp = New-Object System.Drawing.Bitmap 1920, 1080
                              $graphics = [System.Drawing.Graphics]::FromImage($bmp)
                              $graphics.CopyFromScreen(0,0,0,0, [System.Drawing.Size]::new(1920, 1080))
                              $path = "$env:TEMP\ss.jpg"; $bmp.Save($path, [System.Drawing.Imaging.ImageFormat]::Jpeg)
                              curl.exe -s -F "chat_id=$allowedId" -F "photo=@$path" "https://api.telegram.org/bot$botToken/sendPhoto" | Out-Null
                          }
                          default { Send-Msg "[?] Perintah tidak dikenal." }
                      }
                  }
              } catch { Start-Sleep -Seconds 5 }
          }
          '@

          $finalBotCode = $botScriptCode -replace "___BOT_TOKEN___", "${{ secrets.TELEGRAM_BOT_TOKEN }}" `
                                         -replace "___CHAT_ID___", "${{ secrets.TELEGRAM_CHAT_ID }}" `
                                         -replace "___IP___", $env:TAILSCALE_IP `
                                         -replace "___PASS___", $env:RDP_PASS

          $botFile = "azure-finale.ps1"
          Set-Content -Path $botFile -Value $finalBotCode -Encoding UTF8
          pwsh.exe -ExecutionPolicy Bypass -File $botFile

      - name: Cleanup Tailscale
        if: always()
        run: |
          $ts = $env:TS_PATH
          if ($ts -ne $null -and (Test-Path $ts)) {
              Write-Host "Membersihkan exit node..."
              & $ts logout
          }
          
